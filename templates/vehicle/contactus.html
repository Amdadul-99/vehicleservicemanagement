<!DOCTYPE html>
{% load static %}
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* Alert Section */
    .alert-custom {
      text-align: center;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      padding: 15px 0;
      backdrop-filter: blur(10px);
      border-radius: 0;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      margin-top: 30px;
      animation: fadeIn 1s ease-in-out;
    }

    /* Feedback Form */
    .feedback-form {
      max-width: 600px;
      margin: 40px auto;
      background: rgba(255, 255, 255, 0.1);
      color:white;
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .feedback-form input[type="submit"] {
      border-radius: 50px;
      padding: 12px 28px;
      font-size: 1rem;
      margin-top: 20px;
      border: none;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      transition: all 0.3s;
      cursor: pointer;
    }

    .feedback-form input[type="submit"]:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    /* Brand Slider */
    .brand-slider {
      width: 100%;
      overflow: hidden;
      padding: 20px 0;
      margin: 30px 0;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .brand-track {
      display: flex;
      width: calc(200%);
      animation: scrollRight 30s linear infinite;
    }

    .brand-track img {
      width: 120px;
      height: 80px;
      margin: 0 30px;
      object-fit: contain;
      transition: transform 0.3s ease;
    }

    .brand-track img:hover {
      transform: scale(1.2);
    }

    @keyframes scrollRight {
      0% {
        transform: translateX(-50%);
      }

      100% {
        transform: translateX(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .brand-track img {
        width: 90px;
        height: 60px;
        margin: 0 15px;
      }

      .feedback-form {
        margin: 20px;
        padding: 20px;
      }
    }
  </style>
</head>

<body>
  {% include "vehicle/navbar.html" %}

  <div class="alert-custom">
    Send Us Your Valuable Feedback!
  </div>

  <div class="feedback-form">
    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <input type="submit" value="Send Message">
    </form>
  </div>

  <!-- Continuous Brand Slider -->
  <div class="brand-slider">
    <div class="brand-track">
      <img src="{% static 'images/ferrari.png' %}" alt="ferrari">
      <img src="{% static 'images/ford.png' %}" alt="ford">
      <img src="{% static 'images/lambo.png' %}" alt="lambo">
      <img src="{% static 'images/mahindra.png' %}" alt="mahindra">
      <img src="{% static 'images/tvs.png' %}" alt="tvs">
      <img src="{% static 'images/tata.png' %}" alt="tata">
      <img src="{% static 'images/hero.png' %}" alt="hero">
      <img src="{% static 'images/rolls.png' %}" alt="rolls">
      <img src="{% static 'images/suzuki.png' %}" alt="suzuki">
      <!-- duplicate for seamless scroll -->
      <img src="{% static 'images/ferrari.png' %}" alt="ferrari">
      <img src="{% static 'images/ford.png' %}" alt="ford">
      <img src="{% static 'images/lambo.png' %}" alt="lambo">
      <img src="{% static 'images/mahindra.png' %}" alt="mahindra">
      <img src="{% static 'images/tvs.png' %}" alt="tvs">
      <img src="{% static 'images/tata.png' %}" alt="tata">
      <img src="{% static 'images/hero.png' %}" alt="hero">
      <img src="{% static 'images/rolls.png' %}" alt="rolls">
      <img src="{% static 'images/suzuki.png' %}" alt="suzuki">
    </div>
  </div>

  {% include "vehicle/footer.html" %}
</body>

</html>
