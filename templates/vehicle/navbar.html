<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            padding-top: 80px; /* space for fixed navbar */
            background-color: #f5f6fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            background: linear-gradient(90deg, #4f55c7, #6f77e8);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: background 0.3s ease;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffe600 !important;
            letter-spacing: 1px;
            transition: transform 0.3s ease;
        }

        .navbar-brand:hover {
            transform: scale(1.05);
        }

        .nav-link {
            color: #fff !important;
            font-weight: 500;
            margin: 0 0.4rem;
            position: relative;
            transition: all 0.3s ease;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0%;
            height: 2px;
            left: 0;
            bottom: -4px;
            background-color: #ffe600;
            transition: width 0.3s ease;
        }

        .nav-link:hover {
            color: #ffe600 !important;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-link.active {
            color: #ffe600 !important;
            font-weight: 600;
        }

        .navbar-toggler {
            border: none;
        }

        .navbar-toggler-icon {
            color: #fff;
            font-size: 1.2rem;
        }

        @media (max-width: 767px) {
            .nav-link {
                margin: 0.5rem 0;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-md fixed-top">
        <div class="container">
            <a href="/" class="navbar-brand">Vehicle Service Management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse"
                aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"><i class="fas fa-bars"></i></span>
            </button>

            <div class="collapse navbar-collapse justify-content-between" id="navbarCollapse">
                <div class="navbar-nav">
                    <a href="/" class="nav-item nav-link {% if request.path == '/' %}active{% endif %}">Home</a>
                    <a href="/customerclick" class="nav-item nav-link {% if request.path == '/customerclick' %}active{% endif %}">Customer</a>
                    <a href="/mechanicsclick" class="nav-item nav-link {% if request.path == '/mechanicsclick' %}active{% endif %}">Mechanics</a>
                    <a href="/adminclick" class="nav-item nav-link {% if 'admin' in request.path %}active{% endif %}">Admin</a>
                </div>

                <div class="navbar-nav">
                    <a href="/aboutus" class="nav-item nav-link {% if request.path == '/aboutus' %}active{% endif %}">About Us</a>
                    <a href="/contactus" class="nav-item nav-link {% if request.path == '/contactus' %}active{% endif %}">Contact Us</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
