<!DOCTYPE html>
{% load static %}
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      flex-direction: column;
    }

    .jumbotron {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 50px 30px;
      max-width: 700px;
      margin: 80px auto;
      text-align: center;
      color: white;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .jumbotron h1 {
      font-size: 2.8rem;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .jumbotron p.lead {
      font-size: 1.2rem;
      margin-bottom: 25px;
      color: #ddd;
    }

    .jumbotron hr {
      border-top: 1px solid rgba(255, 255, 255, 0.3);
      margin: 30px 0;
    }

    .jumbotron .btn {
      border-radius: 50px;
      padding: 12px 28px;
      font-size: 1rem;
      margin: 5px;
      transition: all 0.3s;
    }

    .jumbotron .btn-primary {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      border: none;
      color: white;
    }

    .jumbotron .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .jumbotron .btn-outline-light {
      color: white;
      border-color: white;
    }

    .jumbotron .btn-outline-light:hover {
      background: white;
      color: #0072ff;
    }

    @media (max-width: 480px) {
      .jumbotron {
        width: 90%;
        padding: 40px 20px;
      }
    }
  </style>
</head>

<body>

  {% include "vehicle/navbar.html" %}

  <div class="jumbotron">
    <h1 class="display-4">Hello, Mechanics</h1>
    <p class="lead">Welcome to Vehicle Service Management</p>
    <hr>
    <p>You can access various features after Login.</p>
    <div>
      <a class="btn btn-primary btn-lg" href="mechanicsignup" role="button">Apply For Job</a>
      <a class="btn btn-outline-light btn-lg" href="mechaniclogin" role="button">Login</a>
    </div>
  </div>

  {% include "vehicle/footer.html" %}

</body>

</html>
