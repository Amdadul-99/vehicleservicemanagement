{% extends 'vehicle/customerbase.html' %}
{% load static %}
{% block content %}

<div class="wrapper">

<head>
<style>

/* Wrapper */
.wrapper {
    padding-top: 80px;
    padding-left: 10px;
    padding-right: 10px;
}

/* Make equal height system */
.row {
    display: flex;
    flex-wrap: wrap;
}

/* Column fix */
.col-sm-6 {
    padding: 10px;
    display: flex;
}

/* 🔥 MAIN FIX */
.counter {
    width: 100%;
    min-height: 160px;   /* same height */
    border-radius: 12px;
    padding: 20px;
    color: rgb(255, 255, 255);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0);

    display: flex;
    flex-direction: column;
    justify-content: space-between; /* top-bottom spacing */
}

/* Text */
.counter h6 {
    font-size: 16px;
    color: rgb(255, 255, 255);
    margin: 0;
}

/* Icon */
.counter h2 {
    text-align: center;
    margin: 0;
}

.counter i {
    font-size: 30px;
}



</style>
</head>

<div class="row">

    <div class="col-sm-6">
        <div class="counter" style="background-color: #5621db; color: white;">
            <a href="/customer-view-request">
                <h6>View Pending Request</h6>
            </a>
            <h2><i class="fas fa-eye"></i></h2>
        </div>
    </div>

    <div class="col-sm-6">
        <div class="counter" style="background-color: #0c3516; color: white;">
            <a href="/customer-add-request">
                <h6>Make Request</h6>
            </a>
            <h2><i class="fas fa-plus-circle"></i></h2>
        </div>
    </div>

    <div class="col-sm-6">
        <div class="counter" style="background-color: #aea91d; color: white;">
            <a href="/customer-view-approved-request">
                <h6>Approved Request</h6>
            </a>
            <h2><i class="fas fa-check-circle"></i></h2>
        </div>
    </div>

    <div class="col-sm-6">
        <div class="counter" style="background-color: #741533; color: white;">
            <a href="/customer-view-approved-request-invoice">
                <h6>Approved Request Bill</h6>
            </a>
            <h2><i class="fas fa-dollar-sign"></i></h2>
        </div>
    </div>

</div>

</div>

{% endblock content %}
