<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    /* Global Styles */
    body {
      font-family: 'Arial', sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 0;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* Grid Container */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 40px;
      padding: 60px 20px;
      max-width: 1200px;
      margin: auto;
    }

    /* Card Styles */
    .card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 15px 25px rgba(0, 0, 0, 0.15);
      text-align: center;
      transition: transform 0.4s, box-shadow 0.4s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-15px);
      box-shadow: 0 25px 35px rgba(0, 0, 0, 0.2);
    }

    /* Image Styles */
    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      transition: transform 0.4s;
    }

    .card:hover img {
      transform: scale(1.05);
    }

    /* Title */
    .title {
      font-size: 24px;
      font-weight: 700;
      margin: 20px 0 10px 0;
      color: #333;
    }

    /* Button Styles */
    .card button {
      margin: 15px 20px 25px 20px;
      padding: 12px 0;
      width: calc(100% - 40px);
      font-size: 18px;
      font-weight: 600;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      transition: 0.4s;
    }

    .card button:hover {
      background: linear-gradient(135deg, #764ba2, #667eea);
      transform: scale(1.05);
    }

    .card button a {
      display: block;
      color: white;
    }

    /* Responsive tweaks */
    @media (max-width: 600px) {
      .card img {
        height: 180px;
      }

      .title {
        font-size: 20px;
      }

      .card button {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="grid-container">
    <div class="card">
      <img src="{% static 'images/admin.png' %}" alt="Customer">
      <p class="title">Customer</p>
      <button><a href="/customerclick">View</a></button>
    </div>

    <div class="card">
      <img src="{% static 'images/mechanic.png' %}" alt="Mechanic">
      <p class="title">Mechanic</p>
      <button><a href="/mechanicsclick">View</a></button>
    </div>
  </div>

</body>

</html>
