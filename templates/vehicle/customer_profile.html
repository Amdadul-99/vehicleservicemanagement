{% extends 'vehicle/customerbase.html' %}
{% load static %}
{% block content %}

<head>
  <!-- Google Fonts for modern look -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Modern CSS -->
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f5f6fa;
      margin: 0;
      padding: 0;
    }

    .profile-container {
      max-width: 700px;
      margin: 50px auto;
      padding: 20px;
    }

    .profile-card {
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      padding: 40px 30px;
      text-align: center;
      position: relative;
    }

    .profile-card img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #008CBA;
      margin-bottom: 20px;
      transition: transform 0.3s;
    }

    .profile-card img:hover {
      transform: scale(1.05);
    }

    .profile-card h3 {
      margin: 10px 0;
      color: #333;
      font-weight: 500;
    }

    .profile-card h3 span {
      color: #008CBA;
      font-weight: 700;
    }

    .btn-modern {
      display: inline-block;
      padding: 15px 30px;
      font-size: 18px;
      font-weight: 500;
      border-radius: 50px;
      border: none;
      background-color: #008CBA;
      color: #fff;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 25px;
      text-decoration: none;
    }

    .btn-modern:hover {
      background-color: #005f7a;
      transform: translateY(-3px);
    }

    /* Responsive adjustments */
    @media screen and (max-width: 768px) {
      .profile-container {
        padding: 10px;
      }
      .profile-card {
        padding: 30px 20px;
      }
      .profile-card img {
        width: 120px;
        height: 120px;
      }
      .btn-modern {
        font-size: 16px;
        padding: 12px 25px;
      }
    }

  </style>
</head>

<div class="profile-container">
  <div class="profile-card">
    <img src="{% static customer.profile_pic.url %}" alt="{{ customer }}">

    <h3><b>Name: </b><span>{{ customer }}</span></h3>
    <h3><b>Mobile: </b><span>{{ customer.mobile }}</span></h3>
    <h3><b>Address: </b><span>{{ customer.address }}</span></h3>

    <a href="/edit-customer-profile" class="btn-modern">Edit Profile</a>
  </div>
</div>

{% endblock content %}
