<!DOCTYPE html>
{% load static %}
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      display: flex;
      flex-direction: column;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* Jumbotron / Confirmation Card */
    .jumbotron {
      margin: 80px auto;
      max-width: 700px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 50px 30px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.8s ease-in-out;
    }

    .jumbotron h1 {
      font-size: 2.8rem;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .jumbotron p.lead {
      font-size: 1.2rem;
      margin-bottom: 25px;
      color: #ddd;
    }

    .jumbotron hr {
      border-top: 1px solid rgba(255, 255, 255, 0.3);
      margin: 30px 0;
    }

    .jumbotron .btn {
      border-radius: 50px;
      padding: 12px 28px;
      font-size: 1rem;
      margin-top: 10px;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      border: none;
      transition: all 0.3s;
    }

    .jumbotron .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .jumbotron {
        width: 90%;
        padding: 40px 20px;
      }

      .jumbotron h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>
  {% include "vehicle/navbar.html" %}

  <div class="jumbotron">
    <h1 class="display-4">Your message sent successfully!</h1>
    <p class="lead">We will respond to your feedback soon</p>
    <hr>
    <p>Check other features of website!</p>
    <a class="btn btn-primary btn-lg" href="/" role="button">HOME</a>
  </div>

  {% include "vehicle/footer.html" %}
</body>

</html>
