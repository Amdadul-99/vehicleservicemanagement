<!DOCTYPE html>
{% load static %}
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      flex-direction: column;
    }

    .jumbotron {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 50px 30px;
      max-width: 700px;
      margin: 80px auto;
      text-align: center;
      color: white;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .jumbotron h1 {
      font-size: 2.8rem;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .jumbotron p.lead {
      font-size: 1.2rem;
      margin-bottom: 25px;
      color: #ddd;
    }

    .jumbotron hr {
      border-top: 1px solid rgba(255, 255, 255, 0.3);
      margin: 30px 0;
    }

    .jumbotron .btn {
      border-radius: 50px;
      padding: 12px 28px;
      font-size: 1rem;
      margin: 5px;
      transition: all 0.3s;
    }

    .jumbotron .btn-primary {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      border: none;
      color: white;
    }

    .jumbotron .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .alert-custom {
      margin: 0;
      text-align: center;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      padding: 12px 0;
      backdrop-filter: blur(10px);
      border-radius: 0;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      animation: fadeIn 1s ease-in-out;
    }

    /* Brand slider container */
    .brand-slider {
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
      padding: 20px 0;
      margin-top: 30px;
    }

    .brand-slider-track {
      display: flex;
      width: calc(250px * 18); /* 18 logos total */
      animation: scrollRight 30s linear infinite;
    }

    .brand-slider-track img {
      width: 120px;
      height: 80px;
      margin: 0 15px;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.4));
      transition: transform 0.3s;
    }

    .brand-slider-track img:hover {
      transform: scale(1.1);
    }

    @keyframes scrollRight {
      0% {
        transform: translateX(-50%);
      }

      100% {
        transform: translateX(0);
      }
    }

    @media (max-width: 480px) {
      .jumbotron {
        width: 90%;
        padding: 40px 20px;
      }

      .brand-slider-track img {
        width: 80px;
        height: 60px;
      }
    }
  </style>
</head>

<body>

  {% include "vehicle/navbar.html" %}

  <div class="alert-custom">
    About Us !
  </div>

  <div class="jumbotron">
    <h1 class="display-4">Hello Rider</h1>
    <p class="lead">A genuine solution to vehicle problems</p>
    <hr>
    <p>Explore our Website.</p>
    <div>
      <a class="btn btn-primary btn-lg" href="/" role="button">HOME</a>
    </div>
  </div>

  <!-- Modern Continuous Brand Slider -->
  <div class="brand-slider">
    <div class="brand-slider-track">
      <img src="{% static "images/ferrari.png" %}" alt="ferrari" />
      <img src="{% static "images/ford.png" %}" alt="ford" />
      <img src="{% static "images/lambo.png" %}" alt="lambo" />
      <img src="{% static "images/mahindra.png" %}" alt="mahindra" />
      <img src="{% static "images/tvs.png" %}" alt="tvs" />
      <img src="{% static "images/tata.png" %}" alt="tata" />
      <img src="{% static "images/hero.png" %}" alt="hero" />
      <img src="{% static "images/rolls.png" %}" alt="rolls" />
      <img src="{% static "images/suzuki.png" %}" alt="suzuki" />
      
      <!-- duplicate for continuous scroll -->
      <img src="{% static "images/ferrari.png" %}" alt="ferrari" />
      <img src="{% static "images/ford.png" %}" alt="ford" />
      <img src="{% static "images/lambo.png" %}" alt="lambo" />
      <img src="{% static "images/mahindra.png" %}" alt="mahindra" />
      <img src="{% static "images/tvs.png" %}" alt="tvs" />
      <img src="{% static "images/tata.png" %}" alt="tata" />
      <img src="{% static "images/hero.png" %}" alt="hero" />
      <img src="{% static "images/rolls.png" %}" alt="rolls" />
      <img src="{% static "images/suzuki.png" %}" alt="suzuki" />
    </div>
  </div>

  {% include "vehicle/footer.html" %}

</body>

</html>
