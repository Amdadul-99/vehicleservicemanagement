<!DOCTYPE html>
{% load static %}
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* Hero Section */
    .hero {
      position: relative;
      height: 50vh;
      margin: 40px 20px 20px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      animation: fadeIn 1s ease forwards;
    }

    .hero::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('{% static "images/bg4.png" %}');
      background-size: cover;
      background-position: center;
      opacity: 0.15;
      z-index: 0;
    }

    .hero h1 {
      position: relative;
      font-size: 3rem;
      font-weight: 600;
      z-index: 1;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Brand Slider */
    .brand-slider {
      width: 100%;
      overflow: hidden;
      padding: 20px 0;
      margin: 30px 0;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .brand-track {
      display: flex;
      width: calc(200%); /* duplicate logos for continuous scroll */
      animation: scrollRight 30s linear infinite;
    }

    .brand-track img {
      width: 120px;
      height: 80px;
      margin: 0 30px;
      object-fit: contain;
      transition: transform 0.3s ease;
    }

    .brand-track img:hover {
      transform: scale(1.2);
    }

    @keyframes scrollRight {
      0% {
        transform: translateX(-50%);
      }

      100% {
        transform: translateX(0);
      }
    }

    /* Cards Section */
    .cards-section {
      max-width: 1200px;
      margin: 50px auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      padding: 0 20px;
    }

    .cards-section .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      text-align: center;
      color: white;
      transition: transform 0.3s;
    }

    .cards-section .card:hover {
      transform: translateY(-10px);
    }

    /* Footer */
    footer {
      background-color: #1a1a1a;
      color: #fff;
      text-align: center;
      padding: 25px 0;
      margin-top: 50px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 2rem;
      }

      .brand-track img {
        width: 90px;
        height: 60px;
        margin: 0 15px;
      }
    }
  </style>
</head>

<body>
  {% include "vehicle/navbar.html" %}

  <!-- Hero Section -->
  <section class="hero">
    <h1>Welcome to Vehicle Service Management</h1>
  </section>

  <!-- Continuous Brand Slider -->
  <div class="brand-slider">
    <div class="brand-track">
      <img src="{% static 'images/ferrari.png' %}" alt="ferrari">
      <img src="{% static 'images/ford.png' %}" alt="ford">
      <img src="{% static 'images/lambo.png' %}" alt="lambo">
      <img src="{% static 'images/mahindra.png' %}" alt="mahindra">
      <img src="{% static 'images/tvs.png' %}" alt="tvs">
      <img src="{% static 'images/tata.png' %}" alt="tata">
      <img src="{% static 'images/hero.png' %}" alt="hero">
      <img src="{% static 'images/rolls.png' %}" alt="rolls">
      <img src="{% static 'images/suzuki.png' %}" alt="suzuki">
      <!-- duplicate logos for continuous scroll -->
      <img src="{% static 'images/ferrari.png' %}" alt="ferrari">
      <img src="{% static 'images/ford.png' %}" alt="ford">
      <img src="{% static 'images/lambo.png' %}" alt="lambo">
      <img src="{% static 'images/mahindra.png' %}" alt="mahindra">
      <img src="{% static 'images/tvs.png' %}" alt="tvs">
      <img src="{% static 'images/tata.png' %}" alt="tata">
      <img src="{% static 'images/hero.png' %}" alt="hero">
      <img src="{% static 'images/rolls.png' %}" alt="rolls">
      <img src="{% static 'images/suzuki.png' %}" alt="suzuki">
    </div>
  </div>

  <!-- Cards Section -->
  <div class="cards-section">
    {% include "vehicle/customer_mechanic_cards.html" %}
  </div>

  <!-- Footer -->
  {% include "vehicle/footer.html" %}
</body>

</html>
